version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: leonexpress_mysql
    command: --mysql-native-password=ON
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-rootpassword}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./data/init:/docker-entrypoint-initdb.d
    networks:
      - leonexpress_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    image: leon_express-backend:latest
    container_name: leonexpress_backend
    environment:
      - NODE_ENV=production
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=mysql
      - DB_PORT=3306
      - JWT_SECRET=${JWT_SECRET}
      - OCR_SPACE_API_KEY=${OCR_SPACE_API_KEY}
      - OCR_PROVIDER=${OCR_PROVIDER:-local}
      - OCR_LOCAL_URL=${OCR_LOCAL_URL:-http://leonexpress_ocr:8000/parse/image}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT}
      # MercadoLibre Gateway (servicio externo en Coolify)
      - ML_GATEWAY_URL=${ML_GATEWAY_URL:-https://gateway.themarvals.com}
      - ML_GATEWAY_API_KEY=${ML_GATEWAY_API_KEY}
    expose:
      - "4100"
    volumes:
      - ./data/uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - leonexpress_network
    restart: unless-stopped

  frontend:
    image: leon_express-frontend:latest
    container_name: leonexpress_frontend
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api}
      - VITE_VAPID_PUBLIC_KEY=${VITE_VAPID_PUBLIC_KEY}
    expose:
      - "80"
    volumes:
      - ./data/uploads:/usr/share/nginx/html/uploads
    depends_on:
      - backend
    networks:
      - leonexpress_network
    restart: unless-stopped

  # NOTE: ml-gateway corre en Coolify (https://gateway.themarvals.com)
  # No se incluye aquí. El backend de LE se conecta a él por HTTPS.


  nginx:
    image: nginx:alpine
    container_name: leonexpress_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/leonexpress.cl.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - leonexpress_network
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:latest
    container_name: leonexpress_portainer
    ports:
      - "8443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    restart: unless-stopped

networks:
  leonexpress_network:
    driver: bridge

volumes:
  portainer_data: