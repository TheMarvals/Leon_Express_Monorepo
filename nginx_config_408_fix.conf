# Configuración mejorada de Nginx para solucionar error 408 con cargas grandes
# 
# INSTRUCCIONES:
# 1. Haz backup de tu configuración actual:
#    sudo cp /etc/nginx/sites-enabled/leonexpress.themarvals.com /etc/nginx/sites-enabled/leonexpress.themarvals.com.backup
#
# 2. Reemplaza el bloque location /api/ con la siguiente configuración:
#
# 3. Verifica la configuración:
#    sudo nginx -t
#
# 4. Recarga nginx:
#    sudo systemctl reload nginx

location /api/ {
    proxy_pass http://127.0.0.1:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Límites para subidas grandes desde Android
    client_max_body_size 150M;
    proxy_request_buffering off;
    
    # HTTP/1.1 para mantener conexiones vivas (keep-alive)
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    
    # Timeouts aumentados a 600s (10 minutos) para cargas grandes de paquetes
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    send_timeout 600s;
    
    # Buffers aumentados para evitar problemas con datos grandes
    proxy_buffer_size 16k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;
    
    # No cachear respuestas de la API
    proxy_cache_bypass $http_upgrade;
    proxy_no_cache $http_upgrade;
}

