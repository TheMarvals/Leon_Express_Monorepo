# ══════════════════════════════════════════════════════
# Nginx config — logistics.leonimport.cl
# Cloudflare Origin Certificate (SSL termina en el server)
# ══════════════════════════════════════════════════════

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name logistics.leonimport.cl;
    return 301 https://$host$request_uri;
}

# HTTPS — Proxy principal
server {
    listen 443 ssl;
    server_name logistics.leonimport.cl;

    ssl_certificate     /etc/nginx/ssl/logistics.leonimport.cl.crt;
    ssl_certificate_key /etc/nginx/ssl/logistics.leonimport.cl.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Tamaño máximo de carga (fotos OCR)
    client_max_body_size 50M;

    # Timeouts generosos para OCR y uploads
    proxy_read_timeout  300s;
    proxy_send_timeout  300s;
    proxy_connect_timeout 60s;

    # ── API Backend → puerto 4100 interno ──────────────
    location /api/ {
        proxy_pass         http://backend:4100/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Uploads estáticos ──────────────────────────────
    location /uploads/ {
        proxy_pass         http://backend:4100/uploads/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        expires            7d;
        add_header         Cache-Control "public";
    }

    # ── Frontend Vue (todo lo demás) ───────────────────
    location / {
        proxy_pass         http://frontend:80/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
