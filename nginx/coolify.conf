server {
    listen 80;
    server_name _;

    # Tamaño máximo de carga (fotos OCR)
    client_max_body_size 150M;

    # Timeouts generosos para OCR y uploads
    proxy_read_timeout  600s;
    proxy_send_timeout  600s;
    proxy_connect_timeout 600s;
    send_timeout 600s;
    proxy_request_buffering off;

    # Buffers para evitar problemas con datos grandes
    proxy_buffer_size 16k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;

    # ── API Backend ──────────────
    location /api/ {
        proxy_pass         http://backend:4100;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_no_cache     $http_upgrade;
    }

    # ── Uploads estáticos ──────────────────────────────
    location /uploads/ {
        proxy_pass         http://backend:4100/uploads/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        expires            7d;
        add_header         Cache-Control "public";
    }

    # ── Frontend Vue (todo lo demás) ───────────────────
    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
