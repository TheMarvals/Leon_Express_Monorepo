server {

    server_name leonexpress.themarvals.com;

    # Serve static images from uploads directory
    location /uploads/ {
        alias /opt/leon_express/data/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API routes go to backend - CONFIGURACIÓN ACTUALIZADA PARA ERROR 408
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Límites para subidas grandes desde Android
        client_max_body_size 150M;
        proxy_request_buffering off;
        
        # HTTP/1.1 para mantener conexiones vivas (keep-alive)
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Timeouts aumentados a 600s (10 minutos) para cargas grandes de paquetes
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        send_timeout 600s;
        
        # Buffers aumentados para evitar problemas con datos grandes
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 32k;
        
        # No cachear respuestas de la API
        proxy_cache_bypass $http_upgrade;
        proxy_no_cache $http_upgrade;
    }

    # All other routes go to frontend
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/leonexpress.themarvals.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/leonexpress.themarvals.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = leonexpress.themarvals.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name leonexpress.themarvals.com;
    return 404; # managed by Certbot
}

