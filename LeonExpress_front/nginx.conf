user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Límite global de tamaño de cuerpo (puede ser sobrescrito por location)
    # Aumentado a 200MB para coincidir con Express y permitir imágenes de alta calidad
    client_max_body_size 200M;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Manejar rutas de SPA (Single Page Application)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache estático
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Servir archivos uploads desde el volumen compartido
        location /uploads/ {
            alias /usr/share/nginx/html/uploads/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Proxy para todas las rutas API
        location /api/ {
            proxy_pass http://backend:4100/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Aumentar límite de tamaño de cuerpo para imágenes batch desde Android/iOS
            # Coincide con Express (200MB) para permitir múltiples imágenes de alta calidad
            client_max_body_size 200M;
            proxy_request_buffering off;
            
            # Timeouts aumentados para subidas grandes
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }
    }
}